server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: all non-file routes → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Health check for Railway
    location /healthz {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
